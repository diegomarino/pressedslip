name: CI
on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build           # MUST be before typecheck/test — playground/examples
                                  # depend on workspace:* root and resolve through
                                  # package.json#exports to ./dist/
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check-docs
      - run: pnpm check-public-docs
      - run: pnpm dlx publint
      - run: pnpm dlx @arethetypeswrong/cli --pack .

  tarball-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node scripts/ci/tarball-smoke.mjs

  typedoc:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build           # docs:api / check-docs resolve 'pressedslip'
                                  # self-imports through package.json#exports
                                  # to ./dist/ — must exist before tsc runs
      - run: pnpm check-docs
      - run: pnpm check-public-docs
      - run: pnpm docs:api
